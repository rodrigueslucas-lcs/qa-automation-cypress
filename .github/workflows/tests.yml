name: Cypress Tests

on:
 push:
    branches:
      - master

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Cypress verify
        run: npx cypress verify

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6